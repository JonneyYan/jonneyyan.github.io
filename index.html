<script>
    // 为轮播图上面的遮罩忽略事件
    $(".slider").on('touchstart', function (e) {
        return false;
    });
    //初始化轮播图
    var sliderTab = $('#slide1').swipeSlide({
        autoSwipe : false,
        // continuousScroll:true,
    });

    //轮播图的上下张按钮
    $(".btn-next").on("tap", function() {
        sliderTab.goTo('next');
    });
    $(".btn-prev").on("tap", function() {
        sliderTab.goTo('prev');
    });
    
    
    //绑定resize事件，动态计算轮播图、标签栏、下载按钮的高度
    $(window).bind('resize', resize);
    function resize () {
        var sliderHeight = $(".slider").width() * 0.765;
        $(".slider").height(sliderHeight);

        var radarHeight = $(".radar").width();
        $(".radar canvas").height(radarHeight);
        $(".radar canvas").width(radarHeight - 20);

        var tabHeight = $(".tabs li").width() * (114 / 240.0);
        $(".tabs li").height(tabHeight);

        var downloadHeight = parseInt($(".download").width() * (159 / 504));
        $(".download").height(downloadHeight);

    }
    resize();

    // 初始化标签栏
    $(".tabs li").each(function (index) {
        $(this).tap(function() {
            var liNode = $(this);  
            $(".tabs .tab-active").removeClass("tab-active");  
            $(".profession-detail .profession-active").removeClass("profession-active");  
            $(".profession-detail .profession").eq(index).addClass("profession-active");
            reloadRadar(index);
            liNode.addClass("tab-active"); 
        })
    })

    $(".tab-right").tap(function () {
        $(".tabs li").each(function (index) {
            var currentTab = $(this); 
            if (currentTab.hasClass("tab-active")) {
                $(".tabs .tab-active").removeClass("tab-active");  
                $(".profession-detail .profession-active").removeClass("profession-active");
                reloadRadar(index);
                if ($(".tabs li").length === index + 1) {
                    $(".profession-detail .profession").first().addClass("profession-active");
                    $(".tabs li").first().addClass("tab-active"); 
                } else{
                    $(".profession-detail .profession").eq(index + 1).addClass("profession-active");
                    currentTab.next().addClass("tab-active"); 
                }
                return false;
                
            }
        })
    })

    $(".tab-left").tap(function () {
        $(".tabs li").each(function (index) {
            var currentTab = $(this); 
            if (currentTab.hasClass("tab-active")) {
                $(".tabs .tab-active").removeClass("tab-active");  
                $(".profession-detail .profession-active").removeClass("profession-active");
                reloadRadar(index);
                if (index === 0) {
                    $(".profession-detail .profession").last().addClass("profession-active");
                    $(".tabs li").last().addClass("tab-active"); 
                } else{
                    $(".profession-detail .profession").eq(index - 1).addClass("profession-active");
                    currentTab.prev().addClass("tab-active"); 
                }
                return false;
                
            }
        })
    })


    function reloadRadar (index) {
        for (var i = 0; i <= data[index].length - 1; i++) {
            window.myRadar.datasets[0].points[i].value = data[index][i];
        };
        window.myRadar.datasets[0].data = data[index];
        window.myRadar.update();
    }

    var data = [
        [6, 4, 4, 4, 5, 5],
        [4, 5, 6, 4, 4, 5],
        [5, 4, 3, 5, 5, 6],
        [3, 6, 5, 5, 6, 3]
    ];

    // 初始化雷达图
    var radarChartData = {
        labels: ["防", "攻", "暴", "单", "群", "控"],
        datasets: [
            {
                fillColor: "rgba(250,225,169,0.88)",
                strokeColor: "rgba(220,220,220,1)",
                pointColor: "rgba(220,220,220,1)",
                pointStrokeColor: "#fff",
                pointHighlightFill: "#fff",
                pointHighlightStroke: "rgba(220,220,220,1)",
                data: data[0]
            }
        ]
    };
    window.myRadar = new Chart(document.getElementById("radar-canvas").getContext("2d")).Radar(radarChartData, {
        responsive: false,
        scaleLineColor: "#d8d1c2",
        angleLineColor: "#d8d1c2",
        pointLabelFontColor: "#d8d1c2",
        pointLabelFontSize: "12",
        pointLabelFontFamily: "Microsoft Yahei",
        datasetStrokeWidth: 1,
        pointDot: false,
        showTooltips: false
    });
